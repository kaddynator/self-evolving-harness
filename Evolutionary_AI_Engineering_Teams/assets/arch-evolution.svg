<svg viewBox="0 0 980 420" font-family="system-ui,sans-serif" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Workflow evolution across generations">
  <rect width="980" height="420" fill="#0f172a" rx="16"/>
  <defs>
    <marker id="evah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- score baseline -->
  <line x1="60" y1="360" x2="920" y2="360" stroke="rgba(255,255,255,.10)"/>
  <text x="40" y="364" text-anchor="end" fill="#94a3b8" font-size="11">score</text>

  <!-- Gen 1 -->
  <text x="160" y="36" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="700">Gen 1 · baseline</text>
  <rect x="90" y="52" width="140" height="200" rx="12" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.08)"/>
  <rect x="104" y="66" width="112" height="20" rx="6" fill="rgba(6,182,212,.12)" stroke="#06b6d4"/><text x="160" y="80" text-anchor="middle" fill="#67e8f9" font-size="10">requirements</text>
  <rect x="104" y="92" width="112" height="20" rx="6" fill="rgba(6,182,212,.12)" stroke="#06b6d4"/><text x="160" y="106" text-anchor="middle" fill="#67e8f9" font-size="10">coder</text>
  <rect x="104" y="118" width="112" height="20" rx="6" fill="rgba(6,182,212,.12)" stroke="#06b6d4"/><text x="160" y="132" text-anchor="middle" fill="#67e8f9" font-size="10">tester</text>
  <rect x="104" y="144" width="112" height="20" rx="6" fill="rgba(6,182,212,.12)" stroke="#06b6d4"/><text x="160" y="158" text-anchor="middle" fill="#67e8f9" font-size="10">reviewer</text>
  <rect x="104" y="170" width="112" height="20" rx="6" fill="rgba(236,72,153,.12)" stroke="#ec4899" stroke-dasharray="3 3"/><text x="160" y="184" text-anchor="middle" fill="#f9a8d4" font-size="10">stakeholder ?</text>
  <rect x="104" y="196" width="112" height="20" rx="6" fill="rgba(236,72,153,.12)" stroke="#ec4899" stroke-dasharray="3 3"/><text x="160" y="210" text-anchor="middle" fill="#f9a8d4" font-size="10">docs ?</text>
  <rect x="104" y="222" width="112" height="20" rx="6" fill="rgba(236,72,153,.12)" stroke="#ec4899" stroke-dasharray="3 3"/><text x="160" y="236" text-anchor="middle" fill="#f9a8d4" font-size="10">compliance ?</text>
  <circle cx="160" cy="330" r="7" fill="#22c55e"/>
  <text x="160" y="385" text-anchor="middle" fill="#94a3b8" font-size="11">7 agents · high tool_calls</text>

  <!-- Gen 2 -->
  <text x="490" y="36" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="700">Gen 2 · prune + strengthen</text>
  <rect x="420" y="52" width="140" height="200" rx="12" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.08)"/>
  <rect x="434" y="66" width="112" height="20" rx="6" fill="rgba(168,85,247,.18)" stroke="#a855f7"/><text x="490" y="80" text-anchor="middle" fill="#c4b5fd" font-size="10">requirements ✎ prompt</text>
  <rect x="434" y="92" width="112" height="20" rx="6" fill="rgba(245,158,11,.16)" stroke="#f59e0b"/><text x="490" y="106" text-anchor="middle" fill="#fcd34d" font-size="10">coder ⤓ budget</text>
  <rect x="434" y="118" width="112" height="20" rx="6" fill="rgba(6,182,212,.12)" stroke="#06b6d4"/><text x="490" y="132" text-anchor="middle" fill="#67e8f9" font-size="10">tester</text>
  <rect x="434" y="144" width="112" height="20" rx="6" fill="rgba(6,182,212,.12)" stroke="#06b6d4"/><text x="490" y="158" text-anchor="middle" fill="#67e8f9" font-size="10">reviewer</text>
  <rect x="434" y="170" width="112" height="20" rx="6" fill="rgba(248,113,113,.10)" stroke="#f87171" stroke-dasharray="3 3"/><text x="490" y="184" text-anchor="middle" fill="#fca5a5" font-size="10">stakeholder ✕</text>
  <rect x="434" y="196" width="112" height="20" rx="6" fill="rgba(248,113,113,.10)" stroke="#f87171" stroke-dasharray="3 3"/><text x="490" y="210" text-anchor="middle" fill="#fca5a5" font-size="10">docs ✕</text>
  <circle cx="490" cy="270" r="7" fill="#22c55e"/>
  <text x="490" y="385" text-anchor="middle" fill="#94a3b8" font-size="11">5 agents · redundant pruned</text>

  <!-- Gen 3 -->
  <text x="820" y="36" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="700">Gen 3 · tuned core</text>
  <rect x="750" y="52" width="140" height="200" rx="12" fill="rgba(255,255,255,.04)" stroke="rgba(34,197,94,.35)"/>
  <rect x="764" y="66" width="112" height="20" rx="6" fill="rgba(34,197,94,.14)" stroke="#22c55e"/><text x="820" y="80" text-anchor="middle" fill="#86efac" font-size="10">requirements ⇪ model</text>
  <rect x="764" y="92" width="112" height="20" rx="6" fill="rgba(34,197,94,.14)" stroke="#22c55e"/><text x="820" y="106" text-anchor="middle" fill="#86efac" font-size="10">coder ⌗ tools</text>
  <rect x="764" y="118" width="112" height="20" rx="6" fill="rgba(34,197,94,.14)" stroke="#22c55e"/><text x="820" y="132" text-anchor="middle" fill="#86efac" font-size="10">tester</text>
  <rect x="764" y="144" width="112" height="20" rx="6" fill="rgba(34,197,94,.14)" stroke="#22c55e"/><text x="820" y="158" text-anchor="middle" fill="#86efac" font-size="10">reviewer</text>
  <circle cx="820" cy="210" r="7" fill="#22c55e"/>
  <text x="820" y="385" text-anchor="middle" fill="#94a3b8" font-size="11">4 agents · best score</text>

  <!-- climbing score line -->
  <polyline points="160,330 490,270 820,210" fill="none" stroke="#22c55e" stroke-width="2.5" marker-end="url(#evah)"/>

  <!-- legend -->
  <rect x="90" y="402" width="12" height="12" rx="3" fill="rgba(168,85,247,.18)" stroke="#a855f7"/><text x="108" y="412" fill="#94a3b8" font-size="11">prompt/model change</text>
  <rect x="280" y="402" width="12" height="12" rx="3" fill="rgba(245,158,11,.16)" stroke="#f59e0b"/><text x="298" y="412" fill="#94a3b8" font-size="11">budget/tools change</text>
  <rect x="470" y="402" width="12" height="12" rx="3" fill="rgba(248,113,113,.10)" stroke="#f87171"/><text x="488" y="412" fill="#94a3b8" font-size="11">removed agent</text>
</svg>
