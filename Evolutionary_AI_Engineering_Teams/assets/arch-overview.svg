<svg viewBox="0 0 980 460" font-family="system-ui,sans-serif" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="End-to-end architecture diagram">
  <rect width="980" height="460" fill="#0f172a" rx="16"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- NL task input -->
  <rect x="20" y="40" width="150" height="62" rx="12" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.08)"/>
  <text x="95" y="66" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">NL Task</text>
  <text x="95" y="84" text-anchor="middle" fill="#94a3b8" font-size="11">+ constraints, domain,</text>
  <text x="95" y="98" text-anchor="middle" fill="#94a3b8" font-size="11">prior lessons</text>

  <!-- Gemini Compiler -->
  <rect x="210" y="32" width="160" height="78" rx="12" fill="rgba(168,85,247,.10)" stroke="#a855f7"/>
  <text x="290" y="60" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Gemini Compiler</text>
  <text x="290" y="80" text-anchor="middle" fill="#94a3b8" font-size="11">synth + schema retry</text>
  <text x="290" y="95" text-anchor="middle" fill="#94a3b8" font-size="11">normalize · stamp model</text>

  <!-- Harness IR -->
  <rect x="410" y="32" width="150" height="78" rx="12" fill="rgba(6,182,212,.10)" stroke="#06b6d4"/>
  <text x="485" y="60" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">Harness IR</text>
  <text x="485" y="80" text-anchor="middle" fill="#94a3b8" font-size="11">agents · tools · phases</text>
  <text x="485" y="95" text-anchor="middle" fill="#94a3b8" font-size="11">edges · eval contract</text>

  <!-- Runtime Executor -->
  <rect x="600" y="32" width="170" height="78" rx="12" fill="rgba(6,182,212,.10)" stroke="#06b6d4"/>
  <text x="685" y="58" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">Runtime Executor</text>
  <text x="685" y="78" text-anchor="middle" fill="#94a3b8" font-size="11">phased agents +</text>
  <text x="685" y="93" text-anchor="middle" fill="#94a3b8" font-size="11">sandboxed tools</text>

  <!-- Scorer + Judge -->
  <rect x="600" y="180" width="170" height="78" rx="12" fill="rgba(34,197,94,.10)" stroke="#22c55e"/>
  <text x="685" y="206" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Scorer + LLM Judge</text>
  <text x="685" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">weighted-sum metrics</text>
  <text x="685" y="241" text-anchor="middle" fill="#94a3b8" font-size="11">+ binary verdicts</text>

  <!-- Weakness Miner -->
  <rect x="410" y="180" width="150" height="78" rx="12" fill="rgba(236,72,153,.10)" stroke="#ec4899"/>
  <text x="485" y="206" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="700">Weakness Miner</text>
  <text x="485" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">failure signatures</text>
  <text x="485" y="241" text-anchor="middle" fill="#94a3b8" font-size="11">→ mechanisms</text>

  <!-- Mutation Engine -->
  <rect x="210" y="180" width="160" height="78" rx="12" fill="rgba(168,85,247,.10)" stroke="#a855f7"/>
  <text x="290" y="206" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Mutation Engine</text>
  <text x="290" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">mechanism → mutation</text>
  <text x="290" y="241" text-anchor="middle" fill="#94a3b8" font-size="11">candidate harnesses</text>

  <!-- Validation Gate -->
  <rect x="20" y="180" width="150" height="78" rx="12" fill="rgba(245,158,11,.10)" stroke="#f59e0b"/>
  <text x="95" y="206" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">Validation Gate</text>
  <text x="95" y="226" text-anchor="middle" fill="#94a3b8" font-size="11">no regression +</text>
  <text x="95" y="241" text-anchor="middle" fill="#94a3b8" font-size="11">improvement</text>

  <!-- Accepted candidate / loop store -->
  <rect x="20" y="330" width="750" height="58" rx="12" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.10)" stroke-dasharray="4 4"/>
  <text x="395" y="356" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Accepted candidate persisted to MongoDB (organization · run · evaluation · lessons) → parent of next generation</text>
  <text x="395" y="374" text-anchor="middle" fill="#94a3b8" font-size="11">every step streams to the observability event bus → live dashboard</text>

  <!-- arrows top row -->
  <line x1="170" y1="71" x2="206" y2="71" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="370" y1="71" x2="406" y2="71" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="560" y1="71" x2="596" y2="71" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <!-- executor down to scorer -->
  <line x1="685" y1="110" x2="685" y2="176" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <!-- bottom row right to left -->
  <line x1="600" y1="219" x2="564" y2="219" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="410" y1="219" x2="374" y2="219" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="210" y1="219" x2="174" y2="219" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <!-- gate runs candidates back through executor (dashed) -->
  <path d="M120,180 C120,140 540,150 600,90" fill="none" stroke="#f59e0b" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text x="300" y="142" text-anchor="middle" fill="#fcd34d" font-size="10">candidates re-run for real before gating</text>
  <!-- accepted loop back (green) -->
  <line x1="95" y1="258" x2="95" y2="326" stroke="#22c55e" stroke-width="2" marker-end="url(#ahg)"/>
  <path d="M770,359 C870,359 900,200 560,71" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ahg)"/>
  <text x="905" y="230" text-anchor="middle" fill="#86efac" font-size="10" transform="rotate(90 905 230)">loop · next generation</text>
</svg>
